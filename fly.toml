# fly.toml — Fly.io deployment config
# docs: https://fly.io/docs/reference/configuration/

app = "nexauth-app"        # Change to your unique app name
primary_region = "iad"    # IAD = Washington DC. Change if needed.

[build]
  [build.args]
    NODE_VERSION = "20"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
